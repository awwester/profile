{% extends "_blog_base.html" %}

{% block body %}
  <div class="blog-article">
    <div class="row full-height">
      <nav class="col m2 hide-on-small-only">
        Hello
      </nav>

      <article class="col m8">
        <h3>{{article.title}}</h3>
        <p><b>{{article.headline}}</b></p>
        <p>{{article.body|safe}}</p>
        <a href="{% url 'blog-home' %}">Blog Home</a>
      </article>

      <aside class="col m2">
      </aside>
    </div>
  </div>
{% endblock %}
