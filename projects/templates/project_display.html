<div class="col s12 m6" data-sr="enter bottom, move 50px">
  <div class="card z-depth-3">
    <div class="card-image shrink">
      <img class="activator" src="{{ project.image.url }}">
    </div>

    <div class="card-content">
      <span class="card-title activator grey-text text-darken-4">{{ project.title }}<i class="material-icons right">more_vert</i></span>
      {% if project.url %}
        <p><a href="{{ project.url }}" target="_blank">Check it out</a></p>
      {% else %}
        <p>Retired</p>
      {% endif %}
    </div>

    <div class="card-reveal">
      <span class="card-title grey-text text-darken-4">{{ project.title }}<i class="material-icons right">close</i></span>
      <p>{{ project.description }}</p>
      {% for tag in project.tag_list %}
        <span class="chip">{{ tag }}</span>
      {% endfor %}
    </div>
  </div>
</div>
